version: '3.9'

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openspace_api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      APP_PORT: "8080"
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openspace_data:/var/openspace/data
      - openspace_databases:/var/openspace/databases
      - openspace_backups:/var/openspace/backups
    networks:
      - openspace_network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: openspace_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-openspace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./backend/migrations/002_add_is_admin.sql:/docker-entrypoint-initdb.d/002_add_is_admin.sql
      - ./backend/migrations/003_container_subscription_link.sql:/docker-entrypoint-initdb.d/003_container_subscription_link.sql
      - ./backend/migrations/008_schema_alignment.sql:/docker-entrypoint-initdb.d/008_schema_alignment.sql
      - ./backend/migrations/009_database_instances.sql:/docker-entrypoint-initdb.d/009_database_instances.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-openspace}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openspace_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: openspace_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openspace_network
    restart: unless-stopped

  traefik:
    image: traefik:v3.0
    container_name: openspace_traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - openspace_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  letsencrypt:
  openspace_data:
  openspace_databases:
  openspace_backups:

networks:
  openspace_network:
    driver: bridge
    name: openspace_network
